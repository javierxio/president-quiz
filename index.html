<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Which President Are You? (Last 50 Years)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --primary: #1e3a8a;
            --accent: #3b82f6;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f8fafc, #e0f2fe);
            margin: 0;
            padding: 0;
            color: #1e2937;
            line-height: 1.6;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0 20px;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary);
            margin: 0;
            font-size: 2.2rem;
        }
        .subtitle {
            color: #64748b;
            margin-top: 8px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            margin-bottom: 25px;
        }
        .progress {
            height: 8px;
            background: #e2e8f0;
            border-radius: 9999px;
            overflow: hidden;
            margin-bottom: 25px;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            width: 0%;
            transition: width 0.4s ease;
        }
        .question {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #1e2937;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 16px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.05rem;
        }
        .option:hover {
            border-color: var(--accent);
            background: #f0f9ff;
        }
        .option.selected {
            border-color: var(--primary);
            background: #eff6ff;
            font-weight: 500;
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            font-weight: 600;
        }
        button:hover {
            background: #1e40af;
        }
        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .result {
            text-align: center;
        }
        .president-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin: 15px 0;
        }
        .score {
            font-size: 1.1rem;
            color: #64748b;
        }
        .share {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .share-btn {
            padding: 10px 20px;
            border-radius: 9999px;
            background: #f1f5f9;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .restart {
            background: transparent;
            color: var(--primary);
            border: 2px solid var(--primary);
            margin-top: 15px;
        }
        .restart:hover {
            background: #eff6ff;
        }
        @media (max-width: 640px) {
            h1 { font-size: 1.9rem; }
            .card { padding: 22px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Which President Are You?</h1>
            <p class="subtitle">Last 50 Years Edition • Fun Personality Quiz</p>
        </header>

        <!-- Quiz Screen -->
        <div id="quiz-screen">
            <div class="card">
                <div class="progress"><div id="progress-bar" class="progress-bar"></div></div>
                <div id="question-number" style="text-align:right; color:#64748b; margin-bottom:8px;">Question 1 of 10</div>
                
                <div id="question-text" class="question"></div>
                
                <div id="options" class="options"></div>
                
                <button id="next-btn" disabled>Next Question</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="card result" style="display:none;">
            <h2 style="margin-top:0;">Your Presidential Match</h2>
            <div id="result-content"></div>
            
            <div class="share">
                <button class="share-btn" onclick="shareResult('twitter')">Share on X</button>
                <button class="share-btn" onclick="shareResult('facebook')">Share on Facebook</button>
                <button class="share-btn" onclick="copyLink()">Copy Link</button>
            </div>
            
            <button class="restart" onclick="restartQuiz()">Take Quiz Again</button>
        </div>
    </div>

    <script>
        const presidents = {
            A: { name: "Jimmy Carter", desc: "Humble, detail-oriented moral compass with a focus on efficiency, energy independence, and human rights.", color: "#1e3a8a" },
            B: { name: "Ronald Reagan", desc: "Optimistic communicator who restored national pride with tax cuts, deregulation, and 'peace through strength'.", color: "#b91c1c" },
            C: { name: "George H.W. Bush", desc: "Steady, experienced team player who builds coalitions and values pragmatic leadership.", color: "#334155" },
            D: { name: "Bill Clinton", desc: "Charismatic bridge-builder who connects personally and masters political triangulation.", color: "#15803d" },
            E: { name: "George W. Bush", desc: "Decisive, folksy leader with clear moral lines and strong national security focus.", color: "#1e40af" },
            F: { name: "Barack Obama", desc: "Hopeful unifier and eloquent inspirer focused on smart diplomacy and healthcare.", color: "#1e3a8a" },
            G: { name: "Donald Trump", desc: "Bold outsider who shakes up the system, puts America First, and cuts through bureaucracy.", color: "#b91c1c" },
            H: { name: "Joe Biden", desc: "Experienced, empathetic consensus-seeker with decades of public service.", color: "#334155" }
        };

        const questions = [
            { q: "Your leadership vibe in one sentence", a: ["A","B","C","D","E","F","G","H"] },
            { q: "Biggest economic priority", a: ["A","B","C","D","E","F","G","H"] },
            { q: "Foreign-policy instinct", a: ["A","B","C","D","E","F","G","H"] },
            { q: "How you communicate", a: ["A","B","C","D","E","F","G","H"] },
            { q: "Crisis response style", a: ["A","B","C","D","E","F","G","H"] },
            { q: "Your relationship with the media", a: ["A","B","C","D","E","F","G","H"] },
            { q: "View on government size", a: ["A","B","C","D","E","F","G","H"] },
            { q: "Personal background you relate to most", a: ["A","B","C","D","E","F","G","H"] },
            { q: "How you handle criticism", a: ["A","B","C","D","E","F","G","H"] },
            { q: "Legacy you’d most like to leave", a: ["A","B","C","D","E","F","G","H"] }
        ];

        const optionsText = [
            ["Humble, detail-oriented, moral compass first",
             "Optimistic “morning in America” communicator who rallies the nation",
             "Steady, experienced team-player who builds coalitions",
             "Charismatic bridge-builder who feels everyone’s pain",
             "Decisive, folksy, “with us or against us” clarity",
             "Hopeful unifier and eloquent inspirer",
             "Bold outsider who shakes things up and cuts through red tape",
             "Experienced, empathetic consensus-seeker who’s been around forever"],
            ["Energy independence and government efficiency",
             "Tax cuts + deregulation to unleash growth",
             "Pragmatic fiscal responsibility",
             "Balanced budgets + targeted social programs",
             "Tax cuts + compassionate conservatism",
             "Stimulus spending + expanding healthcare access",
             "America-first trade deals and tariffs",
             "Massive infrastructure bills + middle-class relief"],
            ["Human rights and diplomacy over military force",
             "Peace through strength and clear ideological lines",
             "Multilateral alliances and careful coalition-building",
             "Selective interventions to stop atrocities",
             "Pre-emptive action against threats",
             "Smart diplomacy, drawdowns, and multilateral deals",
             "“America First” – no endless wars, pressure allies",
             "Strong alliances and steady support for partners"],
            ["Soft-spoken, earnest, maybe a little wonky",
             "Master storyteller with memorable one-liners",
             "Careful, understated, “thousand points of light” style",
             "Empathetic storyteller who connects on a personal level",
             "Straight-talking, plain-spoken Texan energy",
             "Inspirational speeches that feel like poetry",
             "Direct, rally-style, loves social media and nicknames",
             "Folksy, off-the-cuff, “c’mon man” vibe"],
            ["Patient negotiation and moral suasion",
             "Decisive action + inspirational speeches",
             "Deliberate, experienced, avoid rash moves",
             "Quick political triangulation",
             "Rally the public around a clear mission",
             "Cool, measured, data-driven",
             "Bold, disruptive moves and maximum pressure",
             "Steady hand, consult experts, build coalitions"],
            ["Honest but sometimes seen as weak",
             "Use the “bully pulpit” like a pro",
             "Traditional, respectful press conferences",
             "Master of spin and late-night charisma",
             "“Mission accomplished” photo-ops",
             "Cool, composed, digital-era communicator",
             "Love-hate Twitter/X wars, call them “fake news”",
             "Traditional press but occasional gaffes"],
            ["Compassionate but lean government",
             "Get government off people’s backs",
             "Competent, limited government",
             "“The era of big government is over” (but still active)",
             "Small government except for defense + security",
             "Smart, activist government for big problems",
             "Drain the swamp, slash bureaucracy",
             "Government can be a force for good when used right"],
            ["Peanut farmer / engineer / Sunday-school teacher",
             "Actor / optimist who became a movement leader",
             "WWII veteran / CIA director / diplomat",
             "Rhodes scholar / saxophone player / Southern governor",
             "Businessman / baseball owner / governor",
             "Community organizer / constitutional law professor",
             "Real-estate developer / reality-TV star / outsider",
             "Long-time senator / lifelong public servant"],
            ["Stay true to your principles, even if unpopular",
             "Stay positive and keep the vision front-and-center",
             "Quiet dignity and focus on the job",
             "Feel the pain and pivot",
             "Stay the course with resolve",
             "Rise above it with grace and hope",
             "Hit back harder and call it out",
             "Shrug it off with folksy humor"],
            ["Human rights champion and peacemaker",
             "Restored American pride and economic boom",
             "Steady hand through turbulent times",
             "Longest economic expansion in history",
             "Defended freedom and spread democracy",
             "First Black president, landmark healthcare reform",
             "Put America First and reshaped global trade",
             "Infrastructure overhaul + steady governance"]
        ];

        let currentQuestion = 0;
        let answers = new Array(10).fill(null);
        let scores = {A:0, B:0, C:0, D:0, E:0, F:0, G:0, H:0};

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('question-text').textContent = `${currentQuestion + 1}. ${q.q}`;
            document.getElementById('question-number').textContent = `Question ${currentQuestion + 1} of 10`;
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';
            
            optionsText[currentQuestion].forEach((text, i) => {
                const letter = String.fromCharCode(65 + i);
                const div = document.createElement('div');
                div.className = 'option';
                div.textContent = text;
                div.onclick = () => selectOption(letter, div);
                optionsDiv.appendChild(div);
            });
            
            document.getElementById('next-btn').disabled = true;
            updateProgress();
        }

        function selectOption(letter, element) {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));
            element.classList.add('selected');
            answers[currentQuestion] = letter;
            document.getElementById('next-btn').disabled = false;
        }

        function updateProgress() {
            const percent = ((currentQuestion) / 10) * 100;
            document.getElementById('progress-bar').style.width = percent + '%';
        }

        document.getElementById('next-btn').addEventListener('click', () => {
            if (answers[currentQuestion]) {
                currentQuestion++;
                if (currentQuestion < 10) {
                    loadQuestion();
                } else {
                    showResults();
                }
            }
        });

        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            // Calculate scores
            scores = {A:0, B:0, C:0, D:0, E:0, F:0, G:0, H:0};
            answers.forEach(letter => {
                if (letter) scores[letter]++;
            });
            
            // Find top matches
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            const topLetter = sorted[0][0];
            const topPres = presidents[topLetter];
            
            let html = `
                <div style="font-size: 4.5rem; margin: 20px 0;">🇺🇸</div>
                <div class="president-name">${topPres.name}</div>
                <p class="score">You scored ${sorted[0][1]} / 10 matches</p>
                <p style="margin: 25px 0; font-size: 1.15rem; max-width: 500px; margin-left: auto; margin-right: auto;">${topPres.desc}</p>
            `;
            
            // Show top 3
            if (sorted.length > 1) {
                html += `<p style="margin-top:30px; color:#64748b;">Runner-ups:</p><ul style="text-align:left; max-width:420px; margin:15px auto;">`;
                for (let i = 1; i < Math.min(3, sorted.length); i++) {
                    const lettr = sorted[i][0];
                    html += `<li>${presidents[lettr].name} — ${sorted[i][1]} points</li>`;
                }
                html += `</ul>`;
            }
            
            document.getElementById('result-content').innerHTML = html;
        }

        function restartQuiz() {
            currentQuestion = 0;
            answers = new Array(10).fill(null);
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';
            loadQuestion();
        }

        function shareResult(platform) {
            const top = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
            const name = presidents[top].name;
            const text = `I got ${name} on the "Which President of the Last 50 Years Are You?" quiz! Try it yourself:`;
            const url = window.location.href;
            
            if (platform === 'twitter') {
                window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`, '_blank');
            } else if (platform === 'facebook') {
                window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
            }
        }

        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("Link copied to clipboard! Share it with friends.");
            });
        }

        // Start the quiz
        loadQuestion();
    </script>
</body>
</html>
